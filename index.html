<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <img src="logo.png" alt="Logo" class="logo">
            <span class="brand">Restaurant Pro</span>
        </div>
        <div class="nav-right">
            <button class="btn-order">🛒 Commande en ligne</button>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
        <div class="overlay"></div>
        
        <!-- FORMULAIRE -->
        <div class="form-box">
            <h1>🍽️ Bienvenue</h1>
            <p>Connectez-vous ou créez un compte</p>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Connexion</button>
                <button class="tab" onclick="switchTab('register')">Inscription</button>
            </div>

            <!-- LOGIN -->
            <form id="loginForm" class="form active" onsubmit="login(event)">
                <div class="input-group">
                    <label>📧 Email</label>
                    <input type="email" id="loginEmail" required placeholder="votre@email.com">
                </div>
                <div class="input-group">
                    <label>🔒 Mot de passe</label>
                    <input type="password" id="loginPassword" required placeholder="••••••">
                </div>
                <button type="submit" class="btn">Se connecter</button>
            </form>

            <!-- REGISTER -->
            <form id="registerForm" class="form" onsubmit="register(event)">
                <div class="row">
                    <div class="input-group half">
                        <label>👤 Nom</label>
                        <input type="text" id="nom" required>
                    </div>
                    <div class="input-group half">
                        <label>👤 Prénom</label>
                        <input type="text" id="prenom" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>🆔 Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>📱 Téléphone</label>
                    <input type="tel" id="telephone" required>
                </div>
                <div class="input-group">
                    <label>👔 Rôle</label>
                    <select id="role" required>
                        <option value="">Choisir...</option>
                        <option value="admin">Admin</option>
                        <option value="caissier">Caissier</option>
                        <option value="client">Client</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>🔒 Mot de passe</label>
                    <input type="password" id="password" required placeholder="6+ caractères">
                </div>
                <button type="submit" class="btn">Créer un compte</button>
            </form>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Scripts -->
    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
