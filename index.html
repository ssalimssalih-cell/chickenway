<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chicken Way - Fast Food Authentique</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar" id="mainNavbar">
  <div class="navbar-logo"><span>🍗</span><h1>Chicken Way</h1></div>
  <button onclick="openOnlineOrderModal()" class="btn-order-online"><i class="fas fa-shopping-bag"></i> Commander en ligne</button>
</div>
<div class="navbar-spacer"></div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-wrapper">
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon"><img src="logo.png" alt="Chicken Way" class="brand-logo"></div>
      <h1>Chicken <span>Way</span></h1>
      <p>Fast Food Authentique</p>
    </div>
    <div class="login-form">
      <div id="loginError" style="display:none;background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;margin-bottom:15px;text-align:center;font-size:0.9rem;"></div>
      <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email" required></div>
      <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Mot de passe" required></div>
      <button onclick="handleLogin()" class="btn-login" id="loginBtn"><span>Se connecter</span><i class="fas fa-arrow-right"></i></button>
      <p class="register-link" onclick="showRegisterPage()">Pas encore de compte ? <strong>Creer un compte</strong></p>
    </div>
  </div>
</div>

<!-- REGISTER PAGE -->
<div id="registerPage" class="login-wrapper hidden">
  <div class="register-container">
    <div class="register-brand">
      <div class="brand-icon"><img src="logo.png" alt="Chicken Way" class="brand-logo"></div>
      <h1>Chicken <span>Way</span></h1>
      <p>Creer un compte</p>
    </div>
    <div class="register-form">
      <div style="display:flex;gap:10px;"><div class="input-group" style="flex:1;"><i class="fas fa-user"></i><input type="text" id="regNom" placeholder="Nom" required></div><div class="input-group" style="flex:1;"><i class="fas fa-user"></i><input type="text" id="regPrenom" placeholder="Prenom" required></div></div>
      <div class="input-group"><i class="fas fa-id-badge"></i><input type="text" id="regUsername" placeholder="Username" required></div>
      <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email" required></div>
      <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="regTelephone" placeholder="Telephone" required></div>
      <div class="input-group"><i class="fas fa-user-tag"></i><select id="regRole" class="role-select" required><option value="">Role</option><option value="admin">Admin</option><option value="caissier">Caissier</option><option value="client">Client</option></select></div>
      <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Mot de passe (6+)" required minlength="6"></div>
      <button onclick="handleRegister()" class="btn-login" id="registerBtn"><span>S'inscrire</span><i class="fas fa-check"></i></button>
      <p class="register-link" onclick="showLoginPage()"><i class="fas fa-arrow-left"></i> Retour a la connexion</p>
    </div>
  </div>
</div>

<!-- DASHBOARD (identique à votre code existant) -->
<div id="dashboard" class="dashboard hidden">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo"><img src="logo.png" alt="Chicken Way" class="sidebar-logo-img"></div><h2>Chicken <span>Way</span></h2><p class="sidebar-subtitle" id="userRoleDisplay">Gestion Restaurant</p></div>
    <nav class="sidebar-nav">
      <ul id="navMenu">
        <!-- Menu charge dynamiquement selon le role -->
      </ul>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><i class="fas fa-user-circle"></i><span id="currentUserDisplay">Client</span></div><button onclick="handleLogout()" class="logout-item nav-item" style="width:100%;border:none;margin-top:10px;background:none;text-align:left;cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Deconnexion</button></div>
  </aside>
  <main class="main-content" id="mainContent">
    <!-- Contenu dynamique charge par votre script.js existant -->
  </main>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>

<!-- Script d'authentification -->
<script>
var currentUser = null;
var currentUserData = null;

document.addEventListener('DOMContentLoaded', function() {
    auth.onAuthStateChanged(function(user) {
        if (user) {
            currentUser = user;
            db.collection('users').doc(user.uid).get().then(function(doc) {
                if (doc.exists) {
                    var data = doc.data();
                    if (data.authorized === 'yes') {
                        currentUserData = {uid: doc.id, userData: data};
                        localStorage.setItem('currentUser', JSON.stringify(currentUserData));
                        showDashboard();
                        buildMenu();
                    } else {
                        auth.signOut();
                        showLoginPage();
                        showLoginError('Compte en attente de validation par l\'administrateur.');
                    }
                } else {
                    auth.signOut();
                    showLoginPage();
                }
            });
        } else {
            currentUser = null;
            currentUserData = null;
            localStorage.removeItem('currentUser');
            showLoginPage();
        }
    });
});

function showLoginPage() {
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('registerPage').classList.add('hidden');
    document.getElementById('dashboard').classList.add('hidden');
}

function showRegisterPage() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('registerPage').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
}

function showDashboard() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('registerPage').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('currentUserDisplay').textContent = currentUserData.userData.prenom + ' ' + currentUserData.userData.nom;
    document.getElementById('userRoleDisplay').textContent = currentUserData.userData.role === 'admin' ? 'Administrateur' : 'Caissier - POS';
}

function buildMenu() {
    var menu = document.getElementById('navMenu');
    menu.innerHTML = '';
    
    if (currentUserData.userData.role === 'admin') {
        var items = [
            {onclick:"showPage('pos')",icon:'fa-shopping-cart',label:'POS'},
            {onclick:"showPage('categories')",icon:'fa-tags',label:'Categories'},
            {onclick:"showPage('produits')",icon:'fa-hamburger',label:'Produits'},
            {onclick:"showPage('clients')",icon:'fa-users',label:'Clients'},
            {onclick:"showPage('fournisseurs')",icon:'fa-truck',label:'Fournisseurs'},
            {onclick:"showPage('ventes')",icon:'fa-chart-simple',label:'Ventes'},
            {onclick:"showPage('credits')",icon:'fa-credit-card',label:'Credits'},
            {onclick:"showPage('depenses')",icon:'fa-chart-line',label:'Depenses'},
            {onclick:"showPage('stats')",icon:'fa-chart-pie',label:'Statistiques'},
            {onclick:"showPage('options')",icon:'fa-cog',label:'Options'}
        ];
        items.forEach(function(item) {
            var li = document.createElement('li');
            li.className = 'nav-item';
            li.setAttribute('onclick', item.onclick);
            li.innerHTML = '<i class="fas ' + item.icon + '"></i><span>' + item.label + '</span>';
            menu.appendChild(li);
        });
    } else if (currentUserData.userData.role === 'caissier') {
        menu.innerHTML = '<li class="nav-item active" onclick="showPage(\'pos\')"><i class="fas fa-shopping-cart"></i><span>POS</span></li>';
    }
    
    // Logout button
    var logoutLi = document.createElement('li');
    logoutLi.className = 'nav-item logout-item';
    logoutLi.setAttribute('onclick', 'handleLogout()');
    logoutLi.innerHTML = '<i class="fas fa-sign-out-alt"></i><span>Logout</span>';
    menu.appendChild(logoutLi);
}

function showLoginError(msg) {
    var el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
}

function handleLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    var btn = document.getElementById('loginBtn');
    
    if (!email || !password) { showLoginError('Remplissez tous les champs'); return; }
    
    btn.disabled = true;
    btn.innerHTML = '<span>Connexion...</span><i class="fas fa-spinner fa-spin"></i>';
    
    auth.signInWithEmailAndPassword(email, password)
        .then(function(userCredential) {
            return db.collection('users').doc(userCredential.user.uid).get();
        })
        .then(function(doc) {
            if (doc.exists) {
                var data = doc.data();
                if (data.authorized === 'yes') {
                    currentUserData = {uid: doc.id, userData: data};
                    localStorage.setItem('currentUser', JSON.stringify(currentUserData));
                    showDashboard();
                    buildMenu();
                    if (typeof showPage === 'function') showPage('pos');
                } else {
                    auth.signOut();
                    showLoginError('Compte en attente de validation.');
                }
            } else {
                auth.signOut();
                showLoginError('Compte introuvable.');
            }
        })
        .catch(function(error) {
            var msg = error.code === 'auth/user-not-found' ? 'Email non trouve' : error.code === 'auth/wrong-password' ? 'Mot de passe incorrect' : error.message;
            showLoginError(msg);
        })
        .finally(function() {
            btn.disabled = false;
            btn.innerHTML = '<span>Se connecter</span><i class="fas fa-arrow-right"></i>';
        });
}

function handleRegister() {
    var nom = document.getElementById('regNom').value.trim();
    var prenom = document.getElementById('regPrenom').value.trim();
    var username = document.getElementById('regUsername').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var telephone = document.getElementById('regTelephone').value.trim();
    var role = document.getElementById('regRole').value;
    var password = document.getElementById('regPassword').value;
    var btn = document.getElementById('registerBtn');
    
    if (!nom || !prenom || !username || !email || !telephone || !role || !password) {
        alert('Tous les champs sont obligatoires');
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span>Creation...</span><i class="fas fa-spinner fa-spin"></i>';
    
    auth.createUserWithEmailAndPassword(email, password)
        .then(function(userCredential) {
            return db.collection('users').doc(userCredential.user.uid).set({
                nom: nom, prenom: prenom, username: username,
                email: email, telephone: telephone, role: role,
                authorized: 'no',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        })
        .then(function() {
            alert('Compte cree ! En attente de validation par l\'administrateur.');
            showLoginPage();
        })
        .catch(function(error) {
            alert('Erreur: ' + error.message);
        })
        .finally(function() {
            btn.disabled = false;
            btn.innerHTML = '<span>S\'inscrire</span><i class="fas fa-check"></i>';
        });
}

function handleLogout() {
    auth.signOut().then(function() {
        localStorage.removeItem('currentUser');
        currentUser = null;
        currentUserData = null;
        showLoginPage();
    });
}

console.log('Auth script ready');
</script>

</body>
</html>
